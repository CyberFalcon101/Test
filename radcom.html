<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nusrat</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0e8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'EB Garamond', serif;
  }

  .card {
    width: 148mm;
    min-height: 210mm;
    background: #fdfaf4;
    padding: 52px 48px 48px 48px;
    position: relative;
    box-shadow: 0 8px 60px rgba(0,0,0,0.12);
    overflow: hidden;
  }

  /* decorative corner flourishes */
  .card::before {
    content: '';
    position: absolute;
    top: 18px; left: 18px; right: 18px; bottom: 18px;
    border: 0.5px solid #c9b99a;
    pointer-events: none;
  }

  .card::after {
    content: '';
    position: absolute;
    top: 24px; left: 24px; right: 24px; bottom: 24px;
    border: 0.5px solid #e2d5bf;
    pointer-events: none;
  }

  .inner {
    position: relative;
    z-index: 1;
    padding: 24px 16px;
  }

  .word {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: #2c2416;
    line-height: 1;
    margin-bottom: 4px;
  }

  .pronunciation {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    color: #9a8870;
    letter-spacing: 0.02em;
    margin-left: 24px;
    margin-bottom: 28px;
    font-style: italic;
  }

  .pos {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: #b5a48a;
    letter-spacing: 0.12em;
    text-transform: lowercase;
    margin-left: 24px;
    margin-bottom: 14px;
  }

  .definition {
    display: flex;
    gap: 14px;
    margin-left: 24px;
    margin-bottom: 16px;
    align-items: flex-start;
  }

  .num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: #b5a48a;
    min-width: 16px;
    margin-top: 2px;
  }

  .def-text {
    font-family: 'EB Garamond', serif;
    font-size: 16px;
    color: #3a2e1e;
    line-height: 1.7;
    letter-spacing: 0.01em;
  }

  .def-text strong {
    font-weight: 500;
  }

  .divider {
    width: 40px;
    height: 0.5px;
    background: #c9b99a;
    margin: 22px 0 22px 24px;
  }

  .see-also {
    margin-left: 24px;
    margin-top: 28px;
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    color: #9a8870;
    font-style: italic;
    letter-spacing: 0.02em;
    line-height: 1.8;
  }

  .see-also span {
    color: #3a2e1e;
    font-style: normal;
  }

  /* decorative gold dots at corners */
  .dot {
    position: absolute;
    width: 5px;
    height: 5px;
    background: #c9b99a;
    border-radius: 50%;
  }
  .dot.tl { top: 14px; left: 14px; }
  .dot.tr { top: 14px; right: 14px; }
  .dot.bl { bottom: 14px; left: 14px; }
  .dot.br { bottom: 14px; right: 14px; }

  @media print {
    body { background: white; }
    .card { box-shadow: none; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="dot tl"></div>
  <div class="dot tr"></div>
  <div class="dot bl"></div>
  <div class="dot br"></div>

  <div class="inner">
    <div class="word">nusrat</div>
    <div class="pronunciation">/nʊsˈrɑːt/</div>

    <div class="pos">noun</div>

    <div class="definition">
      <div class="num">1.</div>
      <div class="def-text">Arabic origin. victory; triumph granted after perseverance, assistance.</div>
    </div>

    <div class="definition">
      <div class="num">2.</div>
      <div class="def-text">Mother of Raniyah and Aleenah — most importantly, <strong>OUR AUNT.</strong></div>
    </div>

    <div class="divider"></div>

    <div class="pos">verb</div>

    <div class="definition">
      <div class="num">3.</div>
      <div class="def-text">Always being there for our aid.</div>
    </div>

    <div class="see-also">— <em>see also:</em> <span>grace, irreplaceable, one of a kind.</span></div>
  </div>
</div>
</body>
</html>
